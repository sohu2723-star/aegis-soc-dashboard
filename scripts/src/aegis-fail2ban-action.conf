# /etc/fail2ban/action.d/aegis.conf
# Copy this file to /etc/fail2ban/action.d/aegis.conf on Ubuntu Server
# Then add "action = aegis" to your jail.local

[Definition]
actionban   = curl -s -X POST https://aegis-api-server-jp3b.onrender.com/api/ingest/fail2ban \
              -H "Content-Type: application/json" \
              -H "X-AEGIS-Key: your-aegis-ingest-key" \
              -d '{"ip":"<ip>","jail":"<name>","failures":"<failures>"}'

actionunban = curl -s -X POST https://aegis-api-server-jp3b.onrender.com/api/ingest/event \
              -H "Content-Type: application/json" \
              -H "X-AEGIS-Key: your-aegis-ingest-key" \
              -d '{"source":"fail2ban","type":"network_attack","subtype":"IP Unbanned","severity":"low","sourceIp":"<ip>","description":"Fail2ban: IP <ip> unbanned from jail <name>","layer":"perimeter"}'
