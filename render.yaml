services:
  - type: web
    name: aegis-api-server
    env: node
    region: singapore
    plan: free
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: AEGIS_INGEST_KEY
        value: aegis-demo-key-change-me
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString

databases:
  - name: aegis-db
    region: singapore
    plan: free
